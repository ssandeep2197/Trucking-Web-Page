# nginx site config for the templates showcase.
# Serves the Vite-built static bundle out of /usr/share/nginx/html.

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # ── Compression ─────────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    application/javascript
    application/json
    application/xml
    application/wasm
    font/woff
    font/woff2
    image/svg+xml
    text/css
    text/plain
    text/xml;

  # ── Caching ─────────────────────────────────────────────────────────────────
  # Hashed assets (.js / .css / images / fonts) are immutable — Vite renames
  # them on every build, so we can cache them forever.
  location ~* \.(?:js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header Access-Control-Allow-Origin "*";
    access_log off;
    try_files $uri =404;
  }

  # index.html should NOT be cached so users always get the freshest entrypoint.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    expires off;
  }

  # ── SPA fallback ────────────────────────────────────────────────────────────
  # Current router is hash-based so this isn't strictly required, but keeping
  # the fallback means future BrowserRouter paths still resolve.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ── Security headers ────────────────────────────────────────────────────────
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # ── Misc ────────────────────────────────────────────────────────────────────
  # Drop dotfiles and source maps from production exposure.
  location ~ /\.(?!well-known) {
    deny all;
  }
  location ~* \.map$ {
    return 404;
  }

  # Friendly health endpoint for orchestrators / load balancers
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
