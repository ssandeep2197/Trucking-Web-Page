# Standalone deployment of the templates showcase.
# Drop this into a larger compose stack (alongside a reverse proxy like
# Traefik / Caddy / nginx-proxy) and remove the `ports` block if so.
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: templates-showcase:latest
    container_name: templates-showcase
    restart: unless-stopped
    ports:
      - "8080:80"             # change host port to suit your VPS layout
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - web

    # ─── Traefik labels (uncomment if you use Traefik) ────────────────────────
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.templates.rule=Host(`your.domain.com`)"
    #   - "traefik.http.routers.templates.entrypoints=websecure"
    #   - "traefik.http.routers.templates.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.templates.loadbalancer.server.port=80"

networks:
  web:
    driver: bridge
