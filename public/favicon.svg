<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark navy chip background, rounded -->
  <rect width="32" height="32" rx="7" fill="#070914"/>
  <!-- Soft ember wash inside -->
  <rect x="2" y="2" width="28" height="28" rx="6" fill="#ff5a1f" fill-opacity="0.1"/>
  <!-- Ember ring -->
  <rect x="2" y="2" width="28" height="28" rx="6" stroke="#ff5a1f" stroke-opacity="0.5" stroke-width="1.5"/>
  <!-- Diamond (rotated square) in ember — matches the Home page brand mark -->
  <rect x="12" y="12" width="8" height="8" rx="1" fill="#ff5a1f" transform="rotate(45 16 16)"/>
</svg>
