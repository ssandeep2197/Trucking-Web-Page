name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # → ghcr.io/<owner>/<repo>

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.lower.outputs.image }}
      tag: sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      # Container registries require lowercase names — normalize.
      - id: lower
        run: echo "image=${REGISTRY}/${IMAGE_NAME,,}" >>"$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.lower.outputs.image }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Roll out to Kubernetes
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl & kustomize
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Set up kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d >"$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Patch image tag in Kustomize
        working-directory: k8s
        run: |
          # `kubectl kustomize edit` requires kustomize binary
          curl -sL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          ./kustomize edit set image \
            ghcr.io/OWNER/templates-showcase=${{ needs.build.outputs.image }}:${{ needs.build.outputs.tag }}

      - name: Apply manifests
        run: kubectl apply -k k8s/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/templates-showcase \
            --namespace=default --timeout=180s
